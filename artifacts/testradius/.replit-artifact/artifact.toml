kind = "web"
previewPath = "/"
title = "TestRadius Landing Page"
version = "1.0.0"
id = "artifacts/testsquad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19143

[services.development]
run = "pnpm --filter @workspace/testsquad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/testsquad", "run", "build" ]
publicDir = "artifacts/testsquad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19143"
BASE_PATH = "/"
